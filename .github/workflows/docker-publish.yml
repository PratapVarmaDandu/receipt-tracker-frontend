name: Build and publish frontend image

# Manual-only: trigger from the Actions tab → "Run workflow".
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/pratapvarmadandu/receipt-tracker-frontend

jobs:
  build:
    # Native amd64 runner (free for all repos) — matches the x86 VM.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # GitHub Actions layer cache — keeps npm install warm across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

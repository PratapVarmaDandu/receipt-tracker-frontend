<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Steward — Personal Finance &amp; Asset Manager</title>
  <base href="/">
  <!-- viewport-fit=cover: makes content reach iPhone notch / Dynamic Island edges -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- iOS PWA / status bar -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0d2e">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- New Relic Browser Agent runtime config — generated at container start by docker-entrypoint.sh -->
  <script src="/nr-config.js"></script>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts — variable weight for sharper rendering -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Square Web Payments SDK -->
  <!-- sandbox: https://sandbox.web.squarecdn.com/v1/square.js -->
  <!-- production: https://web.squarecdn.com/v1/square.js -->
  <script src="https://web.squarecdn.com/v1/square.js"></script>
</body>
</html>

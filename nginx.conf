# ─────────────────────────────────────────────────────────────────────────────
# HTTP — ACME challenge passthrough + redirect to HTTPS
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name 138.2.208.79.nip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Angular SPA + API proxy
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name 138.2.208.79.nip.io;

    ssl_certificate     /etc/letsencrypt/live/138.2.208.79.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/138.2.208.79.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Spring Boot API proxy ─────────────────────────────────────────────────
    location /api/receipts/upload {
        proxy_pass           http://backend:8080/api/receipts/upload;
        proxy_http_version   1.1;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout   300s;
        proxy_read_timeout   300s;
        client_max_body_size 25M;
    }

    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 25M;
    }

    # ── Spring Security OAuth2 endpoints ─────────────────────────────────────
    location /login/oauth2/ {
        proxy_pass         http://backend:8080/login/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /oauth2/ {
        proxy_pass         http://backend:8080/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Cache static assets aggressively ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

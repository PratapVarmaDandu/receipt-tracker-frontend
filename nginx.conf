# ─────────────────────────────────────────────────────────────────────────────
# HTTP server — serves Angular app + proxies API to Spring Boot backend.
# After SSL is configured (step 6 of the guide), add the HTTPS server block
# at the bottom of this file and remove the HTTP block (or keep it only for
# the Let's Encrypt ACME challenge + redirect to HTTPS).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (used by Certbot to issue the certificate)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Angular SPA ───────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Spring Boot API proxy ─────────────────────────────────────────────────
    # Upload endpoint gets a longer timeout: OCR + optional Vision AI on a
    # HEIC photo from a mobile camera can take 60-180 s.
    location /api/receipts/upload {
        proxy_pass           http://backend:8080/api/receipts/upload;
        proxy_http_version   1.1;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout   300s;
        proxy_read_timeout   300s;
        client_max_body_size 25M;
    }

    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 25M;
    }

    # ── Spring Security OAuth2 endpoints ─────────────────────────────────────
    location /login/ {
        proxy_pass         http://backend:8080/login/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /oauth2/ {
        proxy_pass         http://backend:8080/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Cache static assets aggressively ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

